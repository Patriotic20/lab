upstream backend_nodes {
    server backend:8000;
}


# ──────────────────────────────────────────────
#  1. FRONTEND  →  test.nsumt.uz
# ──────────────────────────────────────────────
server {
    listen 80;
    server_name test.nsumt.uz;

    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }
}

# ──────────────────────────────────────────────
#  2. API / DOCS  →  test.api.nsumt.uz
# ──────────────────────────────────────────────
server {
    listen 80;
    server_name test.api.nsumt.uz;

    # Swagger / ReDoc / OpenAPI are disabled in production.
    # To re-enable for internal use, replace `deny all` with an IP allow-list
    # (e.g. `allow 10.0.0.0/8; deny all;`) or wrap in `auth_basic`.
    location = /docs         { deny all; return 404; }
    location = /docs/        { deny all; return 404; }
    location = /redoc        { deny all; return 404; }
    location = /redoc/       { deny all; return 404; }
    location = /openapi.json { deny all; return 404; }

    # ─── Backend API routes ──────────────────────────────
    location ~ ^/(user|role|permission|faculty|kafedra|group|teacher|question|quiz|quiz_process|result|statistics|students|subject|hemis|user_answers|yakuniy|health|uploads)(/|$) {
        # proxy_pass         http://backend:8000;
        proxy_pass http://backend_nodes;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # SQLAdmin is not safe for public exposure yet (plaintext password compare,
    # no rate limit — fixed in Phase 1). Access via SSH port-forward until then.
    location /admin { deny all; return 404; }

    # Root / Fallback → serve frontend
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    # PGAdmin must not be publicly reachable. Access via SSH port-forward
    # (ssh -L 5050:localhost:5050 <host>) or re-enable behind an IP allow-list.
    location /pgadmin/ { deny all; return 404; }
}


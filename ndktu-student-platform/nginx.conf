server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Backend API routes with /api prefix
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Legacy Backend API routes (direct, without /api) - kept for backward compatibility
    location ~ ^/(user|role|permission|faculty|kafedra|group|teacher|question|quiz|quiz_process|result|statistics|students|subject|hemis|user_answers|yakuniy|resource|health|uploads|evidence)(/|$) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Swagger / ReDoc / OpenAPI are disabled in production.
    # To re-enable for internal use, replace `deny all` with an IP allow-list
    # (e.g. `allow 10.0.0.0/8; deny all;`) or wrap in `auth_basic`.
    location = /docs         { deny all; return 404; }
    location = /docs/        { deny all; return 404; }
    location = /redoc        { deny all; return 404; }
    location = /redoc/       { deny all; return 404; }
    location = /openapi.json { deny all; return 404; }

    # PGAdmin must not be publicly reachable. Access it via SSH port-forward
    # (ssh -L 5050:localhost:5050 <host>) or re-enable behind an allow-list.
    location /pgadmin/ { deny all; return 404; }

    # SQLAdmin mount: not safe for public exposure yet (plaintext password
    # compare, no rate limit — fixed in Phase 1). Access via SSH port-forward.
    location /admin { deny all; return 404; }

    # Static assets — long-term cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

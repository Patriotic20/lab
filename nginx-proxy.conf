# ──────────────────────────────────────────────
#  HTTP → HTTPS redirect
# ──────────────────────────────────────────────
server {
    listen 80;
    server_name organization.api.nsumt.uz;

    # ACME challenge for certbot renewals (if using webroot mode)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ──────────────────────────────────────────────
#  MAIN APP  →  organization.api.nsumt.uz (HTTPS)
# ──────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name organization.api.nsumt.uz;
    client_max_body_size 25M;

    ssl_certificate     /etc/letsencrypt/live/organization.api.nsumt.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/organization.api.nsumt.uz/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }
}

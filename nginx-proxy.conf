# Docker embedded DNS — re-resolve upstream hostnames every 10s so container
# recreation (new IP) doesn't strand nginx on a dead upstream until restart.
resolver 127.0.0.11 valid=10s ipv6=off;

# ──────────────────────────────────────────────
#  1. MAIN SITE (API + Frontend SPA on same host)
#     test.api.nsumt.uz, test.nsumt.uz
# ──────────────────────────────────────────────
server {
    listen 80;
    server_name test.api.nsumt.uz;

    client_max_body_size 20M;

    set $backend_upstream  http://backend:8000;
    set $frontend_upstream http://frontend:80;
    set $pgadmin_upstream  http://pgadmin:5050;

    # Swagger UI
    location /docs {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /redoc {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ─── Backend API routes ──────────────────────
    location ~ ^/(user|role|permission|faculty|kafedra|group|teacher|question|quiz|quiz_process|result|statistics|students|subject|hemis|user_answers|yakuniy|resource|psychology|health|uploads|evidence)(/|$) {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
    }

    # SQLAdmin
    location /admin {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # PGAdmin
    location /pgadmin/ {
        # variable-form proxy_pass skips nginx's prefix-strip, so do it ourselves
        rewrite ^/pgadmin/(.*)$ /$1 break;
        proxy_pass $pgadmin_upstream;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        X-Script-Name     /pgadmin;
        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_read_timeout      120s;
    }

    # Fallback → frontend SPA
    location / {
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ──────────────────────────────────────────────
#  2. FACE DETECTION SERVICE
#     test.face.nsumt.uz
# ──────────────────────────────────────────────
server {
    listen 80;
    server_name test.face.nsumt.uz;

    client_max_body_size 20M;

    set $face_upstream http://face-detection:8000;

    location / {
        proxy_pass $face_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
    }
}

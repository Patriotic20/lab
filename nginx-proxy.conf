upstream backend_nodes {
    server backend:8000;
}

# ──────────────────────────────────────────────
#  1. MAIN SITE (API + Frontend SPA on same host)
#     test.api.nsumt.uz, test.nsumt.uz
# ──────────────────────────────────────────────
server {
    listen 80;
    server_name test.api.nsumt.uz;

    client_max_body_size 20M;

    # Swagger UI
    location /docs {
        proxy_pass http://backend_nodes/docs;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /redoc {
        proxy_pass http://backend_nodes/redoc;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://backend_nodes/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ─── Backend API routes ──────────────────────
    location ~ ^/(user|role|permission|faculty|kafedra|group|teacher|question|quiz|quiz_process|result|statistics|students|subject|hemis|user_answers|yakuniy|resource|psychology|health|uploads|evidence)(/|$) {
        proxy_pass http://backend_nodes;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
    }

    # SQLAdmin
    location /admin {
        proxy_pass http://backend_nodes/admin;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # PGAdmin
    location /pgadmin/ {
        proxy_pass              http://pgadmin:5050/;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        X-Script-Name     /pgadmin;
        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_read_timeout      120s;
    }

    # Fallback → frontend SPA
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ──────────────────────────────────────────────
#  2. FACE DETECTION SERVICE
#     test.face.nsumt.uz
# ──────────────────────────────────────────────
server {
    listen 80;
    server_name test.face.nsumt.uz;

    client_max_body_size 20M;

    location / {
        proxy_pass http://face-detection:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
    }
}

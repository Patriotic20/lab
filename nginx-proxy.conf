# ──────────────────────────────────────────────
#  1. MAIN SITE (API + Frontend SPA on same host)
#     organization.api.nsumt.uz
#
#  Routing rule: anything under /api/ goes to backend, /uploads/ /evidence/
#  /health /metrics also go to backend, and everything else falls through
#  to the React SPA. Adding a new backend module needs ZERO changes here —
#  it will be reachable under /api/<module>/ automatically.
#
#  Admin paths (/admin, /pgadmin, /docs, /redoc, /openapi.json) are
#  intentionally NOT routed. They fall through to the SPA → React 404.
#  Access them via SSH tunnel from the LMS server when needed.
# ──────────────────────────────────────────────
server {
    listen 80;
    server_name organization.api.nsumt.uz;

    client_max_body_size 20M;

    set $backend_upstream  http://backend:8000;
    set $frontend_upstream http://frontend:80;

    # Backend API — single rule, no per-module list to maintain
    location /api/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
    }

    # Static files served by FastAPI StaticFiles (uploads / cheating evidence)
    location /uploads/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /evidence/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Healthcheck + Prometheus metrics — expose to host nginx / monitoring
    location = /health {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /metrics {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Fallback → frontend SPA (also catches /admin, /pgadmin, /docs etc.,
    # which then return a React 404 — no admin surface exposed publicly)
    location / {
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ──────────────────────────────────────────────
#  2. FACE DETECTION SERVICE
#     organization.face.nsumt.uz
# ──────────────────────────────────────────────
server {
    listen 80;
    server_name organization.face.nsumt.uz;

    client_max_body_size 20M;

    set $face_upstream http://face-detection:8000;

    location / {
        proxy_pass $face_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
    }
}

upstream backend_nodes {
    server backend:8000;
}


# ──────────────────────────────────────────────
#  1. MAIN APP  →  organization.api.nsumt.uz
# ──────────────────────────────────────────────
server {
    listen 80;
    server_name organization.api.nsumt.uz;
    client_max_body_size 25M;

    # Swagger UI
    location /docs {
        proxy_pass http://backend_nodes/docs;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # ReDoc
    location /redoc {
        proxy_pass http://backend_nodes/redoc;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # OpenAPI schema
    location /openapi.json {
        proxy_pass http://backend_nodes/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
    }

    # ─── Backend API routes ──────────────────────────────
    location ~ ^/(api|uploads|evidence|health|metrics)(/|$) {
        proxy_pass http://backend_nodes;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Django Admin
    location /admin {
        proxy_pass http://backend_nodes/admin;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    # Root / Fallback → serve frontend
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    # PGAdmin
    location /pgadmin/ {
        proxy_pass              http://pgadmin:5050/;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header        X-Script-Name     /pgadmin;
        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_read_timeout      120s;
    }
}

# ──────────────────────────────────────────────
#  2. FACE DETECTION  →  organization.face.nsumt.uz
# ──────────────────────────────────────────────
server {
    listen 80;
    server_name organization.face.nsumt.uz;
    client_max_body_size 25M;

    location / {
        proxy_pass         http://face-detection:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;

        # WebSocket support
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_read_timeout 60s;
    }
}

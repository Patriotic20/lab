# ─────────────────────────────────────────────────────────────────
#  PRODUCTION OVERRIDE  (docker compose -f docker-compose.yml -f docker-compose.prod.yml up)
#  • Adds nginx reverse-proxy with nginx-proxy.conf
#  • Removes direct port exposure on backend / frontend / face-detection / pgadmin
#  • nginx binds 127.0.0.1:8080 → host nginx forwards to it (see docs/host-nginx-setup.md)
#  • Use:  make prod-up
# ─────────────────────────────────────────────────────────────────

services:
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
      - face-detection
      - pgadmin
    networks:
      - app_network

  face-detection:
    ports: !reset []
    expose:
      - "8000"
    deploy:
      resources:
        limits:
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 45s

  backend:
    ports: !reset []
    expose:
      - "8000"
    deploy:
      resources:
        limits:
          cpus: "1.0"
    environment:
      - APP_CONFIG__SERVER__WORKERS=1
      - APP_CONFIG__SERVER__RELOAD=False
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 60s

  frontend:
    ports: !reset []
    expose:
      - "80"

  database:
    ports: !reset []

  redis:
    ports: !reset []

  pgadmin:
    ports: !reset []
    expose:
      - "5050"

volumes:
  certbot_webroot:

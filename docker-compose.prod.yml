# Production environment - with nginx reverse proxy

services:
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ndktu-student-platform/nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - pgadmin
      - face-detection
    networks:
      - app_network

  backend:
    ports: []
    expose:
      - "8000"

  frontend:
    ports: []
    expose:
      - "80"

  face-detection:
    ports: []
    expose:
      - "8000"

  database:
    ports: []

  redis:
    ports: []

  pgadmin:
    ports: []
    expose:
      - "5050"

# ─────────────────────────────────────────────────────────────────
#  PRODUCTION OVERRIDE  (docker compose -f docker-compose.yml -f docker-compose.prod.yml up)
#  • Traefik handles HTTPS + Let's Encrypt auto-SSL
#  • HTTP → HTTPS redirect automatic
#  • No direct port exposure on backend / frontend / face-detection
#  • Traefik dashboard disabled in prod
#  • Use:  make prod-up
# ─────────────────────────────────────────────────────────────────

services:
  traefik:
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=app_network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt

  face-detection:
    ports: !reset []
    expose:
      - "8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.face.rule=Host(`test.face.nsumt.uz`)"
      - "traefik.http.routers.face.entrypoints=websecure"
      - "traefik.http.routers.face.tls.certresolver=letsencrypt"
      - "traefik.http.services.face.loadbalancer.server.port=8000"

  backend:
    ports: !reset []
    expose:
      - "8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`test.api.nsumt.uz`) && (PathPrefix(`/docs`) || PathPrefix(`/redoc`) || PathPrefix(`/openapi.json`) || PathPrefix(`/user`) || PathPrefix(`/role`) || PathPrefix(`/permission`) || PathPrefix(`/faculty`) || PathPrefix(`/kafedra`) || PathPrefix(`/group`) || PathPrefix(`/teacher`) || PathPrefix(`/question`) || PathPrefix(`/quiz`) || PathPrefix(`/quiz_process`) || PathPrefix(`/result`) || PathPrefix(`/statistics`) || PathPrefix(`/students`) || PathPrefix(`/subject`) || PathPrefix(`/hemis`) || PathPrefix(`/user_answers`) || PathPrefix(`/yakuniy`) || PathPrefix(`/resource`) || PathPrefix(`/psychology`) || PathPrefix(`/health`) || PathPrefix(`/uploads`) || PathPrefix(`/evidence`) || PathPrefix(`/admin`))"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.backend.priority=10"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"

  frontend:
    ports: !reset []
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`test.api.nsumt.uz`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  database:
    ports: !reset []

  redis:
    ports: !reset []

  pgadmin:
    ports: !reset []
    expose:
      - "5050"

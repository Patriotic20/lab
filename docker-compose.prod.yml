# ─────────────────────────────────────────────────────────────────
#  PRODUCTION OVERRIDE  (docker compose -f docker-compose.yml -f docker-compose.prod.yml up)
#  • Docker nginx binds to 127.0.0.1:8080 — host-level nginx forwards :80/:443 → :8080
#  • No direct port exposure on backend / frontend / face-detection / pgadmin
#  • Host-level nginx terminates HTTPS (manage certs with certbot on the host)
#  • Use:  make prod-up
# ─────────────────────────────────────────────────────────────────

services:
  nginx:
    ports: !override
      - "127.0.0.1:8080:80"

  face-detection:
    ports: !reset []
    expose:
      - "8000"
    deploy:
      resources:
        limits:
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 15s

  backend:
    ports: !reset []
    expose:
      - "8000"
    deploy:
      resources:
        limits:
          cpus: "1.0"
    environment:
      - APP_CONFIG__SERVER__WORKERS=3
      - APP_CONFIG__SERVER__RELOAD=False
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 10s

  frontend:
    ports: !reset []
    expose:
      - "80"

  database:
    ports: !reset []

  redis:
    ports: !reset []

  pgadmin:
    ports: !reset []
    expose:
      - "5050"

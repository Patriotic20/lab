# ─────────────────────────────────────────────────────────────────
#  PRODUCTION OVERRIDE  (docker compose -f docker-compose.yml -f docker-compose.prod.yml up)
#  • Docker nginx binds to 127.0.0.1:8080 — host-level nginx forwards :80/:443 → :8080
#  • No direct port exposure on backend / frontend / face-detection / pgadmin
#  • Host-level nginx terminates HTTPS (manage certs with certbot on the host)
#  • Use:  make prod-up
# ─────────────────────────────────────────────────────────────────

services:
  nginx:
    ports: !reset []
    ports:
      - "127.0.0.1:8080:80"

  face-detection:
    ports: !reset []
    expose:
      - "8000"

  backend:
    ports: !reset []
    expose:
      - "8000"

  frontend:
    ports: !reset []
    expose:
      - "80"

  database:
    ports: !reset []

  redis:
    ports: !reset []

  pgadmin:
    ports: !reset []
    expose:
      - "5050"

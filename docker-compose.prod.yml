# ─────────────────────────────────────────────────────────────────
#  PRODUCTION OVERRIDE  (docker compose -f docker-compose.yml -f docker-compose.prod.yml up)
#  • Adds nginx reverse-proxy with nginx-proxy.conf
#  • Removes direct port exposure on backend & frontend
#  • nginx binds  127.0.0.1:8080  →  host nginx forwards to it
#  • Use:  make prod-up
# ─────────────────────────────────────────────────────────────────

services:
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - pgadmin
    networks:
      - app_network

  backend:
    ports: !reset []
    expose:
      - "8000"

  frontend:
    ports: !reset []
    expose:
      - "80"

  pgadmin:
    ports: !reset []
    expose:
      - "5050"

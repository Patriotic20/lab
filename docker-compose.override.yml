# Development environment - localhost without nginx
# Services expose ports directly to localhost

services:
  backend:
    ports:
      - "8000:8000"

  frontend:
    ports:
      - "3000:80"

  face-detection:
    ports:
      - "8001:8000"

  database:
    ports:
      - "5436:5432"

  redis:
    ports:
      - "6379:6379"

  pgadmin:
    ports:
      - "5050:5050"

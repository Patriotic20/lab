name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────
  # JOB 1: Backend Tests
  # ──────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: test_db
        ports:
          - 5436:5432
        options: >-
          --health-cmd "pg_isready -U ci_user -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create backend/.env (CI dummy secrets)
        working-directory: backend
        run: |
          cat > .env <<'EOF'
          APP_CONFIG__DATABASE__URL=postgresql+asyncpg://ci_user:ci_password@localhost:5436/test_db
          APP_CONFIG__DATABASE__TEST_URL=postgresql+asyncpg://ci_user:ci_password@localhost:5436/test_db
          APP_CONFIG__DATABASE__ECHO=False
          APP_CONFIG__DATABASE__ECHO_POOL=False
          APP_CONFIG__DATABASE__POOL_SIZE=10
          APP_CONFIG__DATABASE__MAX_OVERFLOW=5
          APP_CONFIG__SERVER__APP_PATH=app.main:app
          APP_CONFIG__SERVER__HOST=0.0.0.0
          APP_CONFIG__SERVER__PORT=8000
          APP_CONFIG__SERVER__IS_PROD=False
          APP_CONFIG__JWT__ACCESS_TOKEN_SECRET=ci-dummy-access-secret
          APP_CONFIG__JWT__REFRESH_TOKEN_SECRET=ci-dummy-refresh-secret
          APP_CONFIG__JWT__ACCESS_TOKEN_EXPIRES_MINUTES=30
          APP_CONFIG__JWT__REFRESH_TOKEN_EXPIRES_DAYS=7
          APP_CONFIG__JWT__ALGORITHM=HS256
          APP_CONFIG__ADMIN__USERNAME=admin
          APP_CONFIG__ADMIN__PASSWORD=ci-dummy-admin-password
          APP_CONFIG__ADMIN__SECRET_KEY=ci-dummy-admin-secret-key
          APP_CONFIG__FILE_URL__HTTP=http://localhost:8000/uploads/questions
          APP_CONFIG__FILE_URL__UPLOAD_DIR=uploads/questions
          APP_CONFIG__HEMIS__LOGIN_URL=https://student.ndki.uz/rest/v1/auth/login
          APP_CONFIG__HEMIS__ME_URL=https://student.ndki.uz/rest/v1/account/me
          APP_CONFIG__REDIS__HOST=localhost
          APP_CONFIG__REDIS__PORT=6379
          APP_CONFIG__REDIS__PREFIX=fastapi-cache
          APP_CONFIG__FACE_SERVICE__URL=http://localhost:8001
          APP_CONFIG__FACE_SERVICE__INTERNAL_TOKEN=ci-dummy-internal-token
          POSTGRES_USER=ci_user
          POSTGRES_PASSWORD=ci_password
          POSTGRES_DB=test_db
          POSTGRES_HOST=localhost
          POSTGRES_PORT=5436
          EOF

      - name: Sync dependencies
        working-directory: backend
        run: uv sync

      - name: Apply Alembic migrations
        working-directory: backend/app
        run: uv run alembic upgrade head

      - name: Run pytest
        working-directory: backend
        run: uv run pytest -v --tb=short

  # ──────────────────────────────────────────
  # JOB 2: Frontend Build Check
  # ──────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Write frontend/.env
        working-directory: frontend
        run: |
          cat > .env <<'EOF'
          VITE_API_URL=https://test.api.nsumt.uz
          EOF

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  # ──────────────────────────────────────────
  # JOB 3: Deploy to Production
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: [backend-test, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, lms]
    timeout-minutes: 20

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Show deploy info
        run: |
          echo "🚀 Deploying to production"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Server: $(hostname)"

      - name: Write root .env
        run: |
          cat > .env <<EOF
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          PGADMIN_DEFAULT_EMAIL=${{ secrets.PGADMIN_DEFAULT_EMAIL }}
          PGADMIN_DEFAULT_PASSWORD=${{ secrets.PGADMIN_DEFAULT_PASSWORD }}
          INTERNAL_SERVICE_TOKEN=${{ secrets.INTERNAL_SERVICE_TOKEN }}
          EOF
          chmod 600 .env

      - name: Write backend/.env
        working-directory: backend
        run: |
          cat > .env <<EOF
          APP_CONFIG__DATABASE__URL=postgresql+asyncpg://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@database:5432/${{ secrets.POSTGRES_DB }}
          APP_CONFIG__DATABASE__ECHO=False
          APP_CONFIG__DATABASE__ECHO_POOL=False
          APP_CONFIG__DATABASE__POOL_SIZE=50
          APP_CONFIG__DATABASE__MAX_OVERFLOW=10
          APP_CONFIG__SERVER__APP_PATH=app.main:app
          APP_CONFIG__SERVER__HOST=0.0.0.0
          APP_CONFIG__SERVER__PORT=8000
          APP_CONFIG__SERVER__IS_PROD=True
          APP_CONFIG__JWT__ACCESS_TOKEN_EXPIRES_MINUTES=30
          APP_CONFIG__JWT__REFRESH_TOKEN_EXPIRES_DAYS=7
          APP_CONFIG__JWT__ALGORITHM=HS256
          APP_CONFIG__FILE_URL__HTTP=https://test.api.nsumt.uz/uploads/questions
          APP_CONFIG__FILE_URL__UPLOAD_DIR=uploads/questions
          APP_CONFIG__REDIS__HOST=redis
          APP_CONFIG__REDIS__PORT=6379
          APP_CONFIG__REDIS__PREFIX=fastapi-cache
          APP_CONFIG__FACE_SERVICE__URL=http://face-detection:8000
          POSTGRES_HOST=database
          POSTGRES_PORT=5432
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          APP_CONFIG__JWT__ACCESS_TOKEN_SECRET=${{ secrets.APP_CONFIG__JWT__ACCESS_TOKEN_SECRET }}
          APP_CONFIG__JWT__REFRESH_TOKEN_SECRET=${{ secrets.APP_CONFIG__JWT__REFRESH_TOKEN_SECRET }}
          APP_CONFIG__ADMIN__USERNAME=${{ secrets.APP_CONFIG__ADMIN__USERNAME }}
          APP_CONFIG__ADMIN__PASSWORD=${{ secrets.APP_CONFIG__ADMIN__PASSWORD }}
          APP_CONFIG__ADMIN__SECRET_KEY=${{ secrets.APP_CONFIG__ADMIN__SECRET_KEY }}
          APP_CONFIG__HEMIS__LOGIN_URL=${{ secrets.APP_CONFIG__HEMIS__LOGIN_URL }}
          APP_CONFIG__HEMIS__ME_URL=${{ secrets.APP_CONFIG__HEMIS__ME_URL }}
          APP_CONFIG__FACE_SERVICE__INTERNAL_TOKEN=${{ secrets.INTERNAL_SERVICE_TOKEN }}
          EOF
          chmod 600 .env

      - name: Write frontend/.env
        working-directory: frontend
        run: |
          cat > .env <<'EOF'
          VITE_API_URL=https://test.api.nsumt.uz
          EOF

      - name: Zero-Downtime Deploy
        run: make deploy

      - name: Health check
        run: |
          echo "⏳ Waiting for services..."
          sleep 15
          echo "📋 Container status:"
          docker compose ps

      - name: Cleanup old images
        if: always()
        run: |
          docker image prune -f
          docker builder prune -f --keep-storage 5GB

      - name: Deploy notification
        if: success()
        run: echo "✅ Deploy completed successfully at $(date)"

      - name: Deploy failed
        if: failure()
        run: |
          echo "❌ Deploy failed at $(date)"
          docker compose ps
          docker compose logs --tail=50
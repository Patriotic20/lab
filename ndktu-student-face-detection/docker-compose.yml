services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ndktu-face-detection:latest
    container_name: ndktu-face-detection
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MODEL_PATH=/app/blaze_face_short_range.tflite
      - LOG_LEVEL=INFO
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

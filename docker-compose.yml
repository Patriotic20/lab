# ─────────────────────────────────────────────────────────────────
#  DEVELOPMENT  (docker compose up  /  make up)
#  • nginx reverse-proxy on :80  (routes by Host header via nginx-proxy.conf)
#  • Direct ports still exposed so localhost:8000 / :3000 / :8001 work
#    without DNS setup (add test.*.nsumt.uz to /etc/hosts for full routing)
# ─────────────────────────────────────────────────────────────────

services:
  nginx:
    image: nginx:alpine
    container_name: nusmt_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - face-detection
      - pgadmin
    networks:
      - app_network

  face-detection:
    image: nusmt-face-detection:latest
    build:
      context: ./face-detection
      dockerfile: Dockerfile
      cache_from:
        - nusmt-face-detection:latest
      args:
        BUILDKIT_INLINE_CACHE: "1"
    container_name: nusmt_face_detection
    restart: always
    env_file: ./.env
    ports:
      - "8001:8000"
    volumes:
      - backend_uploads:/face/uploads:ro
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    image: nusmt-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      cache_from:
        - nusmt-backend:latest
      args:
        BUILDKIT_INLINE_CACHE: "1"
    container_name: nusmt_backend
    restart: always
    env_file: ./.env
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: start-first
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      face-detection:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - backend_logs:/face/logs
      - backend_uploads:/face/uploads
    networks:
      - app_network
    environment:
      - APP_CONFIG__REDIS__HOST=redis
      - APP_CONFIG__DATABASE__URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      - APP_CONFIG__FACE_SERVICE__URL=http://face-detection:8000
      - APP_CONFIG__FACE_SERVICE__INTERNAL_TOKEN=${INTERNAL_SERVICE_TOKEN}

  frontend:
    image: nusmt-frontend:latest
    build:
      context: ./frontend
      cache_from:
        - nusmt-frontend:latest
      args:
        BUILDKIT_INLINE_CACHE: "1"
    container_name: nusmt_frontend
    restart: always
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app_network

  database:
    image: postgres:17
    container_name: database
    restart: always
    env_file: ./.env
    ports:
      - "5436:5432"
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data_quiz:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: redis_cache
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    networks:
      - app_network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    env_file: ./.env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 5050
      PGADMIN_CONFIG_SCRIPT_NAME: "'/pgadmin'"
    ports:
      - "5050:5050"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - app_network

  prometheus:
    image: prom/prometheus:latest
    container_name: nusmt_prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - app_network
    depends_on:
      - backend

  loki:
    image: grafana/loki:latest
    container_name: nusmt_loki
    restart: always
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    networks:
      - app_network

  promtail:
    image: grafana/promtail:latest
    container_name: nusmt_promtail
    restart: always
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - backend_logs:/var/log/app:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    networks:
      - app_network
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: nusmt_grafana
    restart: always
    ports:
      - "3001:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/fastapi-metrics.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks:
      - app_network
    depends_on:
      - prometheus
      - loki

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data_quiz:
  redis_data:
  pgadmin_data:
  backend_logs:
  backend_uploads:
  grafana_data:
  loki_data:

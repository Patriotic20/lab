# ─────────────────────────────────────────────────────────────────
#  DEVELOPMENT  (docker compose up  /  make up)
#  • No reverse-proxy in dev — services exposed directly on localhost
#  • Frontend serves SPA on :3000 → :80 with default nginx
#  • Use:  make up
# ─────────────────────────────────────────────────────────────────

services:
  face-detection:
    image: nusmt-face-detection:latest
    build:
      context: ./face-detection
      dockerfile: Dockerfile
      cache_from:
        - nusmt-face-detection:latest
      args:
        BUILDKIT_INLINE_CACHE: "1"
    container_name: nusmt_face_detection
    restart: always
    env_file: ./.env
    ports:
      - "8001:8000"
    volumes:
      - backend_uploads:/face/uploads:ro
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    image: nusmt-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      cache_from:
        - nusmt-backend:latest
      args:
        BUILDKIT_INLINE_CACHE: "1"
    container_name: nusmt_backend
    restart: always
    env_file: ./.env
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: start-first
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      face-detection:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - backend_logs:/face/logs
      - backend_uploads:/face/uploads
    networks:
      - app_network
    environment:
      - APP_CONFIG__REDIS__HOST=redis
      - APP_CONFIG__DATABASE__URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      - APP_CONFIG__FACE_SERVICE__URL=http://face-detection:8000
      - APP_CONFIG__FACE_SERVICE__INTERNAL_TOKEN=${INTERNAL_SERVICE_TOKEN}

  # SPA served by nginx inside the container (default nginx config).
  frontend:
    image: nusmt-frontend:latest
    build:
      context: ./frontend
      cache_from:
        - nusmt-frontend:latest
      args:
        BUILDKIT_INLINE_CACHE: "1"
    container_name: nusmt_frontend
    restart: always
    ports:
      - "3000:3000"
    networks:
      - app_network

  database:
    image: postgres:17
    container_name: database
    restart: always
    env_file: ./.env
    ports:
      - "5436:5432"
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data_quiz:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: redis_cache
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    networks:
      - app_network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data_quiz:
  redis_data:
  backend_logs:
  backend_uploads:

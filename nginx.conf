# ──────────────────────────────────────────────
#  Reverse proxy (HTTP only)
#  • Host-level nginx terminates HTTPS and forwards plain HTTP here.
#  • organization.api.nsumt.uz  → backend (/api, /uploads, /evidence,
#    /health, /metrics) + frontend SPA (everything else)
#  • organization.face.nsumt.uz → face-detection service
# ──────────────────────────────────────────────

# ── 1. MAIN SITE (API + Frontend SPA) ──
server {
    listen 80;
    server_name organization.api.nsumt.uz;

    # Docker internal DNS — needed because proxy_pass uses variables
    resolver 127.0.0.11 valid=30s;

    client_max_body_size 20M;

    set $backend_upstream  http://backend:8000;
    set $frontend_upstream http://frontend:80;

    # Backend API
    location /api/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
    }

    # Static files served by FastAPI StaticFiles
    location /uploads/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /evidence/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Healthcheck + Prometheus metrics
    location = /health {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /metrics {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Fallback → frontend SPA
    location / {
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── 2. FACE DETECTION SERVICE ──
server {
    listen 80;
    server_name organization.face.nsumt.uz;

    resolver 127.0.0.11 valid=30s;

    client_max_body_size 20M;

    set $face_upstream http://face-detection:8000;

    location / {
        proxy_pass $face_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
    }
}

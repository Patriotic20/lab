# ── 2. MAIN SITE (API + Frontend SPA) ──
server {
    listen 443 ssl;
    http2 on; # Убедитесь, что версия Nginx >= 1.25.1
    server_name organization.api.nsumt.uz;

    # Внутренний DNS Docker, обязателен при использовании переменных в proxy_pass
    resolver 127.0.0.11 valid=30s;

    ssl_certificate     /etc/letsencrypt/live/organization.api.nsumt.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/organization.api.nsumt.uz/privkey.pem;

    client_max_body_size 20M;

    set $backend_upstream  http://backend:8000;
    set $frontend_upstream http://frontend:80;

    # ... (все ваши location остаются без изменений) ...
    location /api/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        # ... заголовки
    }
    # ...
}

# ── 3. FACE DETECTION SERVICE ──
server {
    listen 443 ssl;
    http2 on;
    server_name organization.face.nsumt.uz;

    # Обязательно добавляем DNS-резолвер и сюда
    resolver 127.0.0.11 valid=30s; 

    ssl_certificate     /etc/letsencrypt/live/organization.api.nsumt.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/organization.api.nsumt.uz/privkey.pem;

    client_max_body_size 20M;

    set $face_upstream http://face-detection:8000;

    location / {
        proxy_pass $face_upstream;
        proxy_http_version 1.1;
        # ... заголовки
    }
}
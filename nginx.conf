# Общий резолвер для Docker
resolver 127.0.0.11 valid=30s;

# ── 1. MAIN SITE (SPA + API) ──
server {
    listen 80;
    server_name organization.api.nsumt.uz;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 20M;

    # Общие настройки прокси для этого сервера
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    # Объединяем ВСЕ запросы к бэкенду (API, файлы, доки, метрики)
    location ~ ^/(api|uploads|evidence|health|metrics|docs|redoc|openapi\.json|admin) {
        proxy_pass http://backend:8000;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
    }

    # Кеширование статики
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA Fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── 2. FACE DETECTION SERVICE ──
server {
    listen 80;
    server_name organization.face.nsumt.uz;
    client_max_body_size 20M;

    location / {
        proxy_pass http://face-detection:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
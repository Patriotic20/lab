# ──────────────────────────────────────────────
#  Reverse proxy with SSL termination
#  • organization.api.nsumt.uz  → backend (/api, /uploads, /evidence,
#    /health, /metrics) + frontend SPA (everything else)
#  • organization.face.nsumt.uz → face-detection service
#  • Port 80 redirects to 443
#  • TLS certs are managed on the host with certbot and mounted
#    read-only at /etc/letsencrypt (single SAN cert covers both domains;
#    cert directory is named after the FIRST -d passed to certbot, i.e.
#    organization.api.nsumt.uz)
# ──────────────────────────────────────────────

# Shared SSL settings
ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers on;
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# ── 1. HTTP → HTTPS redirect (both domains) ──
server {
    listen 80 default_server;
    server_name organization.api.nsumt.uz organization.face.nsumt.uz;

    # Allow ACME http-01 challenge to pass through to the host (in case
    # certbot is run in webroot mode). Everything else redirects.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── 2. MAIN SITE (API + Frontend SPA) ──
server {
    listen 443 ssl;
    http2 on;
    server_name organization.api.nsumt.uz;

    ssl_certificate     /etc/letsencrypt/live/organization.api.nsumt.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/organization.api.nsumt.uz/privkey.pem;

    client_max_body_size 20M;

    set $backend_upstream  http://backend:8000;
    set $frontend_upstream http://frontend:80;

    # Backend API
    location /api/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
    }

    # Static files served by FastAPI StaticFiles
    location /uploads/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /evidence/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Healthcheck + Prometheus metrics
    location = /health {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /metrics {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Fallback → frontend SPA (also catches /admin, /pgadmin, /docs etc.,
    # which then return a React 404 — no admin surface exposed publicly)
    location / {
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── 3. FACE DETECTION SERVICE ──
server {
    listen 443 ssl;
    http2 on;
    server_name organization.face.nsumt.uz;

    ssl_certificate     /etc/letsencrypt/live/organization.api.nsumt.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/organization.api.nsumt.uz/privkey.pem;

    client_max_body_size 20M;

    set $face_upstream http://face-detection:8000;

    location / {
        proxy_pass $face_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
    }
}
